# Lefthook configuration
# https://github.com/evilmartians/lefthook

pre-commit:
  parallel: true
  jobs:
    - name: oxlint
      run: bun oxlint --fix {staged_files}
      stage_fixed: true
    - name: oxfmt
      run: bun oxfmt --write {staged_files}
      stage_fixed: true

pre-push:
  parallel: false
  files: git ls-files
  jobs:
    - name: typecheck
      run: bun run typecheck
    - name: lint
      run: bun run lint
    - name: format
      run: bun run format:check
    - name: test
      run: bun run test
