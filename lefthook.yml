# Lefthook configuration
# https://github.com/evilmartians/lefthook

pre-commit:
  parallel: true
  jobs:
    - name: oxlint
      run: bun oxlint --fix {staged_files}
      stage_fixed: true
    - name: oxfmt
      run: bun oxfmt --write {staged_files}
      stage_fixed: true

pre-push:
  parallel: false
  files: git ls-files
  jobs:
    - name: directory-patterns
      run: sh -c 'bun run check:patterns' -- {files}
    - name: typecheck
      run: sh -c 'bun run typecheck' -- {files}
    - name: lint
      run: bun oxlint {files}
    - name: format
      run: bun oxfmt --check {files}
    - name: test
      run: sh -c 'bun run test' -- {files}
